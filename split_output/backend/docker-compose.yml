# RouteCare — local/production stack: PostgreSQL + FastAPI API (which also serves the frontend).
services:
  db:
    image: postgres:17
    environment:
      POSTGRES_USER: ${PGUSER:-postgres}
      POSTGRES_PASSWORD: ${PGPASSWORD:-postgres}
      POSTGRES_DB: ${PGDATABASE:-routecare}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PGUSER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    env_file: .env
    environment:
      # Point the app at the "db" service (overrides any host value from .env).
      DATABASE_URL: postgresql+psycopg2://${PGUSER:-postgres}:${PGPASSWORD:-postgres}@db:5432/${PGDATABASE:-routecare}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    # Run migrations, then start the server.
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"

volumes:
  pgdata:
